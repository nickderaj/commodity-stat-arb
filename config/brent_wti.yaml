economic_tether: >
  Brent and WTI are close substitutes for refiners. Location/quality differential
  (North Sea waterborne vs Cushing landlocked) is bounded by pipeline capacity and
  trade-flow economics. Regime-aware z-score required due to structural break risk
  (2011 Cushing glut, 2015 US export ban repeal).
